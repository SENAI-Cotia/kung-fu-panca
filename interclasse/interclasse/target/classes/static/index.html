<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Interclasse SENAI SESI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

<main class="login-shell">

    <section class="brand-panel">
        <div class="brand-content">
            <div class="brand-lines">
                SENAI<br>
                <span>SESI</span>
            </div>
            <p>PELO FUTURO DO TRABALHO</p>
        </div>

        <div class="line-art"></div>
    </section>

    <section class="login-panel">
        <div class="login-card animate-in">

            <p class="eyebrow">Sistema de Interclasse</p>

            <h1>Bem-vindo de volta</h1>

            <p class="muted">
                Faça login para acessar a plataforma.
            </p>

            <form class="form-grid" onsubmit="login(); return false;">

                <label>
                    E-mail
                    <input id="user" type="email" placeholder="seu@email.com" required>
                </label>

                <label>
                    Senha
                    <input id="pass" type="password" placeholder="Digite sua senha" required>
                </label>

                <button class="btn primary full" type="submit">
                    Entrar
                </button>

            </form>

        </div>
    </section>

</main>

<div id="toast" class="toast"></div>

<script src="script.js"></script>

</body>
</html>
