<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Criar Time | Interclasse SENAI SESI</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<input type="hidden" id="usuarioLogado" th:value="${#authentication.name}">

<div class="app-layout">

    <aside class="sidebar">

        <div class="sidebar-logo">
            SENAI<br>
            <span>SESI</span>
        </div>

        <nav>
            <a th:href="@{/dashboard}">
                ⌂ Dashboard
            </a>

            <a class="active" th:href="@{/criarTime}">
                ⚑ Criar Time
            </a>
        </nav>

        <form method="post" th:action="@{/logout}">
            <button class="logout-link" type="submit">
                ↳ Sair
            </button>
        </form>

    </aside>

    <main class="main-content">

        <header class="topbar">

            <button class="menu-btn" onclick="toggleSidebar()">
                ☰
            </button>

            <div>
                <strong>Criar Time</strong>
                <span sec:authentication="name">usuario@email.com</span>
            </div>

            <div class="avatar">U</div>

        </header>

        <section class="page-head animate-in">

            <p class="eyebrow">Cadastro</p>

            <h1>Novo Time</h1>

            <p class="muted">
                Cadastre seu time no sistema interclasse.
            </p>

        </section>

        <section class="panel animate-in delay-1">

            <div class="panel-head">
                <div>
                    <h2>Informações do time</h2>
                    <p>
                        Cada usuário pode criar apenas um time.
                    </p>
                </div>
            </div>

            <div class="form-grid">

                <label>
                    Nome do time
                    <input
                            id="nomeTime"
                            type="text"
                            placeholder="Digite o nome do time"
                    >
                </label>

                <label>
                    Turma
                    <select id="turma">
                        <option value="">Selecione</option>
                        <option>1º Ano A</option>
                        <option>1º Ano B</option>
                        <option>1º Ano C</option>
                        <option>2º Ano A</option>
                        <option>2º Ano B</option>
                        <option>2º Ano C</option>
                        <option>3º Ano A</option>
                        <option>3º Ano B</option>
                        <option>3º Ano C</option>
                    </select>
                </label>

                <label>
                    Modalidade
                    <select id="modalidade">
                        <option value="">Selecione</option>
                        <option>Futebol</option>
                        <option>Vôlei</option>
                        <option>Basquete</option>
                    </select>
                </label>

                <label>
                    Categoria
                    <select id="categoria">
                        <option value="">Selecione</option>
                        <option>Masculino</option>
                        <option>Feminino</option>
                    </select>
                </label>

            </div>

            <div class="players-box">

                <div class="players-head">
                    <h3>Integrantes</h3>

                    <button class="btn primary" onclick="addAluno()">
                        + Adicionar aluno
                    </button>
                </div>

                <div id="alunos"></div>

            </div>

            <div class="actions">

                <a class="btn ghost" th:href="@{/dashboard}">
                    Cancelar
                </a>

                <button class="btn primary" onclick="criarTime()">
                    Salvar time
                </button>

            </div>

        </section>

    </main>

</div>

<div id="toast" class="toast"></div>

<script th:src="@{/js/script.js}"></script>

</body>
</html>
