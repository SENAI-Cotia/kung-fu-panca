<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | Interclasse SENAI SESI</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="app-layout">

    <aside class="sidebar">

        <div class="sidebar-logo">
            SENAI<br>
            <span>SESI</span>
        </div>

        <nav>
            <a class="active" th:href="@{/dashboard}">
                ⌂ Dashboard
            </a>

            <a th:href="@{/criarTime}">
                ⚑ Criar Time
            </a>
        </nav>

        <form method="post" th:action="@{/logout}">
            <button class="logout-link" type="submit">
                ↳ Sair
            </button>
        </form>

    </aside>

    <main class="main-content">

        <header class="topbar">

            <button class="menu-btn" onclick="toggleSidebar()">
                ☰
            </button>

            <div>
                <strong>Aluno</strong>
                <span sec:authentication="name">usuario@email.com</span>
            </div>

            <div class="avatar">U</div>

        </header>

        <section class="page-head animate-in">

            <p class="eyebrow">SENAI SESI</p>

            <h1>Dashboard do Aluno</h1>

            <p class="muted">
                Visualize o campeonato e acompanhe os times cadastrados.
            </p>

        </section>

        <section class="stats-grid animate-in delay-1">

            <article class="stat-card">
                <span>Times cadastrados</span>
                <strong id="statTimes">0</strong>
                <i>⚑</i>
            </article>

            <article class="stat-card">
                <span>Alunos cadastrados</span>
                <strong id="statAlunos">0</strong>
                <i>☷</i>
            </article>

            <article class="stat-card">
                <span>Modalidades</span>
                <strong>3</strong>
                <i>🏆</i>
            </article>

            <article class="stat-card">
                <span>Meu time</span>
                <strong id="statMeuTime">0</strong>
                <i>★</i>
            </article>

        </section>

        <section class="panel animate-in delay-2">

            <div class="panel-head">
                <div>
                    <h2>Times cadastrados</h2>
                    <p>
                        Lista geral dos times do interclasse.
                    </p>
                </div>
            </div>

            <div id="times" class="team-list"></div>

        </section>

    </main>

</div>

<div id="toast" class="toast"></div>

<script th:src="@{/js/script.js}"></script>

</body>
</html>
